CONFIG_GPIO=n
CONFIG_ZMK_BLE=n
CONFIG_LOG=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n
CONFIG_ZMK_LOG_LEVEL_DBG=y

CONFIG_ZMK_STUDIO=y
CONFIG_SETTINGS=y
CONFIG_ZMK_CUSTOM_SETTINGS=y
CONFIG_ZMK_CUSTOM_SETTINGS_TEST=y
CONFIG_ZMK_CUSTOM_SETTINGS_STUDIO_RPC=y
CONFIG_ZMK_STUDIO_RPC_CUSTOM_SUBSYSTEM_PRINT_LIST_ON_START=y
CONFIG_ZMK_CUSTOM_SETTINGS_LARGE_VALUE_MAX_SIZE=256
# Feature gating P5: the self-tests exercise every optional feature, so
# explicitly opt in to all five now that they default to n.
CONFIG_ZMK_CUSTOM_SETTINGS_LARGE_VALUES=y
CONFIG_ZMK_CUSTOM_SETTINGS_ARRAY=y
CONFIG_ZMK_CUSTOM_SETTINGS_KEYSPACE=y
CONFIG_ZMK_CUSTOM_SETTINGS_RPC_CONVERTERS=y
CONFIG_ZMK_CUSTOM_SETTINGS_RECORD=y
