include:
  - artifact: custom_settings_board_feature_disabled
    board: xiao_ble//zmk
    shield: tester_xiao

  - artifact: custom_settings_board_with_rpc
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_CUSTOM_SETTINGS=y -DCONFIG_ZMK_CUSTOM_SETTINGS_STUDIO_RPC=y -DCONFIG_ZMK_CUSTOM_SETTINGS_ZMK_CONFIG_SAMPLES=y -DCONFIG_ZMK_STUDIO_RPC_RX_BUF_SIZE=128 -DCONFIG_ZMK_STUDIO_RPC_CUSTOM_SUBSYSTEM_REQUEST_PAYLOAD_MAX_BYTES=96
    snippet: studio-rpc-usb-uart

  - artifact: custom_settings_board_without_rpc
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: -DCONFIG_ZMK_CUSTOM_SETTINGS=y -DCONFIG_ZMK_CUSTOM_SETTINGS_ZMK_CONFIG_SAMPLES=y

  - artifact: custom_settings_split_peripheral_with_rpc_relay
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: -DCONFIG_ZMK_CUSTOM_SETTINGS=y -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_CUSTOM_SETTINGS_STUDIO_RPC=y -DCONFIG_ZMK_CUSTOM_SETTINGS_ZMK_CONFIG_SAMPLES=y -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_BLE=y -DCONFIG_ZMK_SPLIT_RELAY_EVENT=y -DCONFIG_ZMK_CUSTOM_SETTINGS_SPLIT_RPC_RELAY=y -DCONFIG_ZMK_SPLIT_RELAY_EVENT_TYPE_NAME_LEN=4 -DCONFIG_ZMK_SPLIT_RELAY_EVENT_DATA_LEN=256

  - artifact: custom_settings_split_central_with_rpc_relay
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: -DCONFIG_ZMK_CUSTOM_SETTINGS=y -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_CUSTOM_SETTINGS_STUDIO_RPC=y -DCONFIG_ZMK_CUSTOM_SETTINGS_ZMK_CONFIG_SAMPLES=y -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y -DCONFIG_ZMK_SPLIT_BLE=y -DCONFIG_ZMK_SPLIT_RELAY_EVENT=y -DCONFIG_ZMK_CUSTOM_SETTINGS_SPLIT_RPC_RELAY=y -DCONFIG_ZMK_SPLIT_RELAY_EVENT_TYPE_NAME_LEN=4 -DCONFIG_ZMK_SPLIT_RELAY_EVENT_DATA_LEN=256
    snippet: studio-rpc-usb-uart
