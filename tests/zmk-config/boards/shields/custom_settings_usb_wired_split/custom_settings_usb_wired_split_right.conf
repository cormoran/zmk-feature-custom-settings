# custom_settings_usb_wired_split PERIPHERAL half (right) -- the custom-settings
# split RPC relay's peripheral role, over the WIRED split link.
#
# Wired split only: enable ZMK split + force the wired UART transport to
# interrupt mode (async/DMA has an nRF52 RX bug under Renode; polling is
# untested here). BLE and USB both OFF: no BLE avoids the empty-NVS BLE
# controller oops under Renode, no USB avoids the USBD busy-wait hang -- the
# peripheral needs neither (it talks only to the central over uart1).
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_WIRED_UART_MODE_INTERRUPT=y
CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=n

# The custom-settings relay defers each relayed request's protobuf
# decode/exec/encode onto the low-priority workqueue; the default 768-byte stack
# overflows on that chain. Give it headroom (matches the module's own
# split-relay hardware config).
CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=4096

# Console stays on uart0 (a Renode TCP terminal): the split link status and the
# custom-settings relay's DBG lines are read straight off uart0 -- no SEGGER RTT
# needed.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_LOG=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=0
CONFIG_ZMK_LOG_LEVEL_DBG=y
