CONFIG_ZMK_CUSTOM_SETTINGS=y
CONFIG_ZMK_CUSTOM_SETTINGS_ZMK_CONFIG_SAMPLES=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_RELAY_EVENT=y
CONFIG_ZMK_CUSTOM_SETTINGS_SPLIT_RPC_RELAY=y
# Compile/build coverage only: verifies large settings build in a relay-enabled
# image. Large (> single-frame) values are NOT carried across the split relay
# (an oversized value is omitted from the peripheral notification).
CONFIG_ZMK_CUSTOM_SETTINGS_LARGE_VALUE_MAX_SIZE=256
